<!DOCTYPE html>

<style>
        body { font-family: 'Inter', sans-serif; }
    </style>

<body class="bg-background text-on-background min-h-screen flex flex-col antialiased selection:bg-primary-container selection:text-on-primary-container">
<!-- TopAppBar -->
<header class="bg-[#0c1322] docked full-width top-0 z-50">
<div class="flex justify-between items-center w-full px-6 py-4">
<div class="flex items-center gap-4">
<h1 class="font-['Inter'] font-bold tracking-tight text-xl font-black tracking-tighter text-blue-600 dark:text-blue-400">Obsidian Tally</h1>
</div>
<div class="flex items-center gap-4 hidden md:flex">
<button class="p-2 text-blue-400 font-bold hover:opacity-80 transition-opacity scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span class="sr-only">Tally</span>
</button>
<button class="p-2 text-slate-500 hover:opacity-80 transition-opacity scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined">history</span>
<span class="sr-only">Logs</span>
</button>
<button class="p-2 text-slate-500 hover:opacity-80 transition-opacity scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined">settings</span>
<span class="sr-only">Settings</span>
</button>
</div>
<div class="flex items-center gap-4 md:hidden">
<button class="p-2 text-blue-600 dark:text-blue-400 hover:opacity-80 transition-opacity scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined">history</span>
</button>
<button class="p-2 text-blue-600 dark:text-blue-400 hover:opacity-80 transition-opacity scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined">settings</span>
</button>
</div>
</div>
</header>
<!-- Main Content: The Nocturnal Monolith -->
<main class="flex-grow flex flex-col items-center justify-center px-6 pb-32 pt-8 relative overflow-hidden">
<!-- Ambient Background Glow -->
<div class="absolute inset-0 pointer-events-none flex items-center justify-center">
<div class="w-[500px] h-[500px] bg-primary-container/5 rounded-full blur-[100px]"></div>
</div>
<div class="w-full max-w-md flex flex-col items-center relative z-10">
<!-- Context Label -->
<div class="mb-4">
<span class="font-label text-xs font-medium uppercase tracking-[0.05em] text-on-surface-variant/70">Sayaç</span>
</div>
<!-- The Counter Monolith -->
<div class="bg-surface-container rounded-xl p-12 w-full flex flex-col items-center justify-center mb-8 relative">
<!-- Ghost border fallback for structural feel -->
<div class="absolute inset-0 border border-outline-variant/15 rounded-xl pointer-events-none"></div>
<h2 class="font-display font-bold text-[5rem] leading-none text-on-primary-container tracking-tighter drop-shadow-[0_0_20px_rgba(37,99,235,0.2)]">
                    0
                </h2>
<div class="mt-4 opacity-0">
<span class="text-sm text-on-surface-variant">Pulse Anchor</span>
</div>
</div>
<!-- Controls (Asymmetric & Tonal) -->
<div class="w-full flex flex-col gap-6">
<!-- Primary Actions Grid -->
<div class="grid grid-cols-2 gap-4">
<!-- Azalt (Decrease) -->
<button class="bg-secondary-container text-on-secondary-container rounded-lg py-5 px-6 flex items-center justify-center gap-2 transition-all hover:brightness-125 active:scale-95 shadow-[0_4px_20px_rgba(187,1,18,0.15)] group relative overflow-hidden">
<div class="absolute inset-0 bg-white/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="material-symbols-outlined text-[2rem]" style="font-variation-settings: 'wght' 600;">remove</span>
<span class="font-label font-bold tracking-wide">Azalt</span>
</button>
<!-- Artır (Increase) -->
<button class="bg-gradient-to-br from-primary to-primary-container text-on-primary rounded-lg py-5 px-6 flex items-center justify-center gap-2 transition-all hover:brightness-110 active:scale-95 shadow-[0_4px_30px_rgba(37,99,235,0.3)] group relative overflow-hidden">
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="material-symbols-outlined text-[2rem]" style="font-variation-settings: 'wght' 600;">add</span>
<span class="font-label font-bold tracking-wide">Artır</span>
</button>
</div>
<!-- Secondary Action (Off-center/Asymmetric) -->
<div class="flex justify-end mt-2">
<button class="bg-surface-variant text-on-surface-variant rounded-full py-2 px-5 flex items-center gap-2 hover:bg-surface-bright transition-colors text-sm font-medium border border-outline-variant/20">
<span class="material-symbols-outlined text-sm">restart_alt</span>
                        Sıfırla
                    </button>
</div>
</div>
</div>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="md:hidden bg-[#0c1322]/40 backdrop-blur-xl fixed bottom-0 w-full z-50 shadow-[0_-4px_40px_rgba(37,99,235,0.1)]">
<div class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-2">
<!-- Active Tab -->
<button class="flex flex-col items-center justify-center bg-blue-600/10 text-blue-400 rounded-xl px-4 py-2 hover:text-blue-300 transition-colors scale-110 duration-150 ease-out group">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span class="font-['Inter'] text-[10px] font-medium uppercase tracking-[0.05em]">Tally</span>
</button>
<!-- Inactive Tab -->
<button class="flex flex-col items-center justify-center text-slate-500 px-4 py-2 hover:text-blue-300 transition-colors group">
<span class="material-symbols-outlined mb-1 transition-transform group-hover:scale-110">history</span>
<span class="font-['Inter'] text-[10px] font-medium uppercase tracking-[0.05em]">Logs</span>
</button>
<!-- Inactive Tab -->
<button class="flex flex-col items-center justify-center text-slate-500 px-4 py-2 hover:text-blue-300 transition-colors group">
<span class="material-symbols-outlined mb-1 transition-transform group-hover:scale-110">tune</span>
<span class="font-['Inter'] text-[10px] font-medium uppercase tracking-[0.05em]">Settings</span>
</button>
</div>
</nav>

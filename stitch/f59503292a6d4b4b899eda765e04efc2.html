<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0c1322; /* Fallback */
        }
        
        /* Custom Loading Spinner Styles */
        .spinner-ring {
            position: relative;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 0%, #2563eb 50%, #b4c5ff 100%);
            mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #000 0);
            -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #000 0);
            animation: spin 1s linear infinite;
        }

        .spinner-ring::before {
            content: '';
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, transparent 0%, rgba(37, 99, 235, 0.2) 50%, rgba(180, 197, 255, 0.4) 100%);
            z-index: -1;
            filter: blur(10px);
            animation: spin 1s linear infinite reverse;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .pulse-text {
            animation: pulse-opacity 2s ease-in-out infinite;
        }

        @keyframes pulse-opacity {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
